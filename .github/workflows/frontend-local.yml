name: Frontend - Validación Local (QA Check)

on:
  push:
    paths:
      - 'client/**' 
  pull_request:
    paths:
      - 'client/**' 
  workflow_dispatch: 
jobs:
  check-frontend:
    runs-on: [ self-hosted ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        working-directory: ./client
        run: npm install

      - name: Compilar
        working-directory: ./client
        run: npm run build --if-present

      - name: Ejecutar pruebas
        working-directory: ./client
        run: npm run test --if-present

      - name: Construir imagen Docker
        run: |
          docker build -t frontend:latest ./client

      - name: Verificar imagen creada
        run: docker images
