name : Bakend - Validación en la parte local (QA)

on: 
  push: 
    branches:
      - 'Feat_*'
    paths:
      - 'server/**'
  pull_request:
    branches:
      - 'QA'
    paths:
      - 'server/src/**'
  workflow_dispatch: 

jobs:
  check-backend: 
    runs-on: ubuntu-latest

    steps:
      - name: Download Code
        uses: actions/checkout@v4 ##Chequeo

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.2.1'

      - name: Validar Servidor
        run: |
          # Si los comandos del backend los corres desde la raíz usando el package.json principal:
          cd server
          npm install
          npm run build --if-present
          npm run test --if-present
