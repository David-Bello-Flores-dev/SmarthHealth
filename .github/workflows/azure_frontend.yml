############################# SCRIPT CORREGIDO Y ESTRUCTURADO #######################################
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: REDACTED  # Asegúrate de poner el nombre exacto de la App Service en Azure
  NODE_VERSION: '25.2.1'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Restaurar e instalar dependencias del Frontend
      run: |
        cd client
        npm install

    - name: Compilar Frontend con Vite
      run: |
        cd client
        npm run build

    - name: Subir únicamente el Build (dist) como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: client/dist  # <--- Solo guardamos el resultado listo para producción

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Descargar artefacto compilado
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: . # Descarga los archivos de dist directamente en la raíz de ejecución

    - name: 'Deploy to Azure WebApp'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3 # Usamos la v3 que es la versión estable actual
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_DEPLOYMENT_FRONT }}
        package: . # El contenido de dist ya está aquí listo para subirse
