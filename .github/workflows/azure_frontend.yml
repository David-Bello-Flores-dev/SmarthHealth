name: Deploy to Azure WebApp

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: REDACTED # Nombre exacto de tu App Service en Azure
  NODE_VERSION: '25.2.1'
  AZURE_WEBAPP_PACKAGE_PATH: '.' # El artefacto se descargará en la raíz del job de deploy

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Instalar dependencias y compilar Frontend (Vite)
      run: |
        cd client
        npm install
        npm run build

    - name: Subir únicamente el Build (dist) como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: client/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
    - name: Descargar artefacto compilado
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: . # Descarga el contenido de dist directamente en la raíz

    - name: Desplegar en Azure WebApp
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_DEPLOYMENT_FRONT }} # Pasa el XML del Publish Profile directamente
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
