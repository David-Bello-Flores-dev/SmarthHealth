############################# SCRIPT CORREGIDO PARA PRUEBAS DE PIPELINE #######################################
on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'client/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'frontendApp'
  NODE_VERSION: '25.2.1'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
        
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        # Nota: quitamos el cache temporalmente porque como vimos en el backend, 
        # a veces traba el setup si el lockfile cambia de posición.

    - name: Instalar dependencias
      run: |
        cd client
        npm install

    - name: Build frontend
      run: |
        cd client
        npm run build
        echo "=== Contenido de client/dist/ ==="
        ls -la dist # Corregido: ya estamos dentro de client

    - name: Generar artefacto ZIP para Azure
      run: |
        cd client/dist
        zip -r ../../frontend.zip . # Empaquetamos el contenido de dist en la raíz
        
    - name: Deploy a Azure
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_DEPLOYMENT_FRONT }}
        package: ./frontend.zip # Corregido: Mandamos el archivo ZIP que Azure espera
